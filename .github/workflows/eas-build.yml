name: EAS Build Debug

on:
  workflow_dispatch:

jobs:
  debug:
    name: EAS Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build Android
        run: |
          eas build --platform android --profile production --non-interactive 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::BUILD_FAILED: $(tail -5 /tmp/build.log | tr '\n' ' ' | head -c 800)"
            exit 1
          fi
