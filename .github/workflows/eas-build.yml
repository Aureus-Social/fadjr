name: EAS Build Debug

on:
  workflow_dispatch:

jobs:
  debug:
    name: EAS Debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Debug
        run: |
          set +e
          echo "WHOAMI:" > /tmp/debug.txt
          eas whoami >> /tmp/debug.txt 2>&1
          echo "PROJECT INFO:" >> /tmp/debug.txt
          eas project:info >> /tmp/debug.txt 2>&1
          echo "BUILD ATTEMPT:" >> /tmp/debug.txt
          eas build --platform android --profile production --non-interactive >> /tmp/debug.txt 2>&1
          echo "EXIT CODE: $?" >> /tmp/debug.txt
          cat /tmp/debug.txt
          echo "::error::$(cat /tmp/debug.txt | tr '\n' ' ' | head -c 1000)"
