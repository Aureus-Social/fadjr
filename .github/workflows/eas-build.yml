name: EAS Build (iOS + Android)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Debug and Build
        run: |
          echo "=== WHOAMI ===" | tee -a $GITHUB_STEP_SUMMARY
          eas whoami 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo "=== PROJECT INFO ===" | tee -a $GITHUB_STEP_SUMMARY
          eas project:info 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo "=== BUILD ===" | tee -a $GITHUB_STEP_SUMMARY
          eas build --platform android --profile production --non-interactive 2>&1 | tee -a $GITHUB_STEP_SUMMARY
