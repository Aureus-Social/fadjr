name: EAS Build (iOS + Android)

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android AAB (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Debug EAS info
        run: |
          echo "=== WHOAMI ==="
          eas whoami 2>&1 || true
          echo "=== PROJECT INFO ==="
          eas project:info 2>&1 || true
          echo "=== APP.JSON owner/slug/projectId ==="
          node -e "const a=require('./app.json').expo; console.log('owner:',a.owner,'slug:',a.slug,'projectId:',a.extra?.eas?.projectId)"
      - name: Build Android AAB
        run: eas build --platform android --profile production --non-interactive 2>&1 || true
