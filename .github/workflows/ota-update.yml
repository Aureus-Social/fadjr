name: OTA Update (auto)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/eas-build.yml'
      - '*.md'

jobs:
  update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

     - name: Push OTA update (preview)
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive

      - name: Push OTA update (production)
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
